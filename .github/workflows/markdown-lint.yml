name: Markdown Lint

on:
  pull_request:
    paths:
      - README.md
      - DEVELOP.md
      - docs/source/index.md
      - docs/source/api/actor.md
      - docs/source/api/world.md
      - .github/workflows/markdown-lint.yml
  push:
    branches:
      - main
    paths:
      - README.md
      - DEVELOP.md
      - docs/source/index.md
      - docs/source/api/actor.md
      - docs/source/api/world.md
      - .github/workflows/markdown-lint.yml

jobs:
  markdown-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run markdownlint
      run: |
        npx -y markdownlint-cli2 \
          README.md \
          DEVELOP.md \
          docs/source/index.md \
          docs/source/api/actor.md \
          docs/source/api/world.md