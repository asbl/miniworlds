name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout test submodules
        run: git submodule update --init libraries/physics libraries/examples

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install task dependencies
        run: |
          python -m pip install --upgrade pip
          pip install invoke

      - name: Build test image
        run: invoke build.image

      - name: Run unit tests
        run: invoke tests.unit

  full-tests:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout test submodules
        run: git submodule update --init libraries/physics libraries/examples

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install task dependencies
        run: |
          python -m pip install --upgrade pip
          pip install invoke

      - name: Build test image
        run: invoke build.image

      - name: Run full test suite
        run: invoke tests.cached
